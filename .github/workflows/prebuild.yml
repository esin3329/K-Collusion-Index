name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build static Pages artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Run data generation script
        run: python python/generate_data.py

      - name: Verify generated file exists
        run: test -f public/data/k-collusion-index.json

      - name: Install Node dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify static export exists
        run: |
          test -f out/index.html
          test -f out/data/k-collusion-index.json

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-pages-out
          path: out
